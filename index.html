<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Virtual Assistant</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== RESET ===== */
* { box-sizing: border-box; }

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  animation: fadeIn 1s ease;

}
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;

  /* Background image */
  background:
    linear-gradient(rgba(102,126,234,0.75), rgba(118,75,162,0.75)),
    url("background.jpg");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  animation: fadeIn 1s ease;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 1000px;
  margin: 40px auto;
  background: white;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* ===== TITLE ===== */
h1 {
  text-align: center;
  background: linear-gradient(90deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===== FORM ===== */
.task-form {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.task-form input,
.task-form select,
.task-form button {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 14px;
}

.task-form button {
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  border: none;
  cursor: pointer;
}

.task-form button:hover {
  transform: scale(1.05);
}

/* ===== FLEX LAYOUT ===== */
.flex {
  display: flex;
  gap: 20px;
}

/* ===== TASK SECTIONS ===== */
.tasks {
  flex: 2;
}

.section {
  margin-bottom: 20px;
}

.section h3 {
  color: #444;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #f1f1f1;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  animation: slideUp 0.4s ease;
}

li.done {
  background: #b9f6ca;
  text-decoration: line-through;
}

/* ===== CHART ===== */
.chart-box {
  margin-top: 30px;
  text-align: center;
}

canvas {
  max-width: 300px;
  margin: auto;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
@keyframes slideUp {
  from {transform: translateY(10px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}
</style>
</head>

<body>

<div class="container">
  <h1>Smart Virtual Assistant</h1>

  <!-- FORM -->
  <div class="task-form">
    <input id="taskName" placeholder="Task name">
    <input type="time" id="taskTime">
    <select id="taskType">
      <option>Daily</option>
      <option>Weekly</option>
      <option>Monthly</option>
    </select>
    <button onclick="addTask()">Add Task</button>
  </div>

  <!-- TASK SECTIONS -->
  <div class="flex">
    <div class="tasks">

      <div class="section">
        <h3>📅 Daily Tasks</h3>
        <ul id="daily"></ul>
      </div>

      <div class="section">
        <h3>📆 Weekly Tasks</h3>
        <ul id="weekly"></ul>
      </div>

      <div class="section">
        <h3>🗓️ Monthly Tasks</h3>
        <ul id="monthly"></ul>
      </div>

    </div>
  </div>

  <!-- PIE CHART -->
  <div class="chart-box">
    <h3>📊 Work Done Today</h3>
    <canvas id="taskChart"></canvas>
  </div>
</div>

<script>
let tasks = [];
let chart;

/* Ask notification permission */
if ("Notification" in window) {
  Notification.requestPermission();
}

/* ADD TASK */
function addTask() {
  const name = taskName.value.trim();
  const time = taskTime.value;
  const type = taskType.value;

  if (!name || !time) return;

  tasks.push({
    name,
    time,
    type,
    done: false,
    notified10: false,
    notifiedNow: false
  });

  taskName.value = "";
  taskTime.value = "";
  render();
}

/* TOGGLE DONE */
function toggleDone(i) {
  tasks[i].done = !tasks[i].done;
  render();
}

/* RENDER TASKS */
function render() {
  daily.innerHTML = weekly.innerHTML = monthly.innerHTML = "";

  tasks.forEach((t, i) => {
    const li = document.createElement("li");
    li.innerHTML = `${t.name} (${t.time})
      <button onclick="toggleDone(${i})">✔</button>`;
    if (t.done) li.classList.add("done");

    if (t.type === "Daily") daily.appendChild(li);
    if (t.type === "Weekly") weekly.appendChild(li);
    if (t.type === "Monthly") monthly.appendChild(li);
  });

  updateChart();
}

/* PIE CHART */
function updateChart() {
  const done = tasks.filter(t => t.done).length;
  const pending = tasks.length - done;

  if (chart) chart.destroy();

  chart = new Chart(taskChart, {
    type: "pie",
    data: {
      labels: ["Completed", "Pending"],
      datasets: [{
        data: [done, pending],
        backgroundColor: ["#66bb6a", "#ef5350"]
      }]
    }
  });
}

/* REMINDER CHECK (every minute) */
setInterval(() => {
  const now = new Date();

  tasks.forEach(t => {
    const [h, m] = t.time.split(":");
    const taskTime = new Date();
    taskTime.setHours(h, m, 0);

    const diff = (taskTime - now) / 60000;

    if (diff <= 10 && diff > 9 && !t.notified10) {
      notify(`Reminder: "${t.name}" in 10 minutes`);
      t.notified10 = true;
    }

    if (diff <= 0 && diff > -1 && !t.notifiedNow) {
      notify(`Time to do: "${t.name}"`);
      t.notifiedNow = true;
    }
  });
}, 60000);

/* NOTIFICATION */
function notify(msg) {
  if (Notification.permission === "granted") {
    new Notification("Smart Virtual Assistant", { body: msg });
  } else {
    alert(msg);
  }
}
</script>

</body>
</html>
